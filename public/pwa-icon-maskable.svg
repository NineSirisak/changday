    <polygon points="256,40 442,148 442,364 256,472 70,364 70,148" fill="none" stroke="url(#gold-grad-m)" stroke-width="20" stroke-linejoin="round" />
    <polygon points="256,70 416,162 416,350 256,442 96,350 96,162" fill="#090d16" opacity="0.9" />
    <text x="256" y="300" text-anchor="middle" font-family="'Prompt', sans-serif" font-weight="900" font-size="124" fill="url(#gold-grad-m)" letter-spacing="2">DN</text>
    <text x="256" y="365" text-anchor="middle" font-family="'Prompt', sans-serif" font-weight="600" font-size="24" fill="#e2e8f0" letter-spacing="4">DAY NERAMIT</text>
  </g>
</svg>
